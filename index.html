<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--B:#1A5FAD;--BL:#E3EEF8;--BD:#0B3F74;--PK:#A03365;--PL:#F5E3EE;--PD:#6E1F44;--GR:#7A7870;--GL:#F0EEE8;--RD:#C0392B;--AU:#C8A96A;--INK:#1C1B19;--MU:#8A8880;--LN:#D8D5CC;--CR:#FAF9F5}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--CR);color:var(--INK);display:flex;flex-direction:column;height:100vh}
header{background:linear-gradient(135deg,#1a3a5c 0%,#2c5f8a 100%);padding:8px 12px 0;flex-shrink:0;position:relative}
.h1{display:flex;align-items:center;gap:5px;margin-bottom:2px}
.ht{font-family:'Playfair Display',serif;font-size:clamp(14px,3.6vw,19px);font-weight:700;color:#fff;flex:1}
.hbs{display:flex;gap:3px;flex-wrap:wrap}
.hb{border:none;border-radius:6px;padding:5px 8px;font-size:clamp(9px,2.2vw,12px);cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;color:#fff;background:rgba(255,255,255,0.13)}
.hb.p{background:#2c5f8a}.hb.gr{background:#1a5f2e}.hb.rd{background:#8B0000}.hb.tl{background:rgba(0,110,110,0.7)}
.nm{text-align:center;font-size:clamp(10px,2.5vw,13px);color:var(--AU);font-style:italic;font-family:'Playfair Display',serif;padding:2px 0}
.krow{text-align:center;padding:2px 0 3px}
.kbtn{background:rgba(255,255,255,0.13);border:1px solid rgba(255,255,255,0.22);border-radius:14px;padding:4px 12px;color:#fff;font-size:clamp(9px,2.2vw,11px);cursor:pointer;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:6px}
/* Search row */
.hsr{display:flex;align-items:center;gap:6px;padding:4px 0 5px}
.hsi{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.14);border-radius:16px;padding:5px 11px;flex:1;max-width:260px}
.hsi input{border:none;outline:none;background:transparent;color:#fff;font-size:12px;flex:1;font-family:'DM Sans',sans-serif;min-width:0}
.hsi input::placeholder{color:rgba(255,255,255,0.45)}
/* Breadcrumb */
#tr{font-size:clamp(10px,2.4vw,12px);color:rgba(255,255,255,0.8);white-space:nowrap;overflow-x:auto;scrollbar-width:none;padding:3px 0 5px;font-weight:500}
#tr::-webkit-scrollbar{display:none}
.ti{display:inline;cursor:pointer}.ti:hover{color:var(--AU)}.ts{color:var(--AU);margin:0 3px;font-size:10px}
/* Stbar */
.stbar{background:rgba(0,0,0,0.18);padding:3px 12px;display:flex;gap:12px;font-size:clamp(9px,2vw,11px);color:rgba(255,255,255,0.7);flex-shrink:0}
.stbar span{white-space:nowrap}
/* Print menu */
#pmenu{display:none;position:absolute;top:38px;right:8px;background:#fff;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,0.2);z-index:500;min-width:210px;overflow:hidden;border:1px solid #eee}
#pmenu div{padding:11px 15px;cursor:pointer;font-size:13px;font-weight:500;color:var(--INK);border-bottom:1px solid #f0eeea;font-family:'DM Sans',sans-serif}
#pmenu div:last-child{border-bottom:none}#pmenu div:hover{background:#f8f8f8}
/* Canvas */
#cw{flex:1;overflow:hidden;position:relative;background:var(--CR);cursor:grab;touch-action:none}
#cw.g{cursor:grabbing}
#mv{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
#sv{position:absolute;top:0;left:0;pointer-events:none;overflow:visible;transform-origin:0 0;will-change:transform}
/* Nodes */
.nd{position:absolute;display:flex;flex-direction:column;align-items:center}
.np{border-radius:10px;border:2px solid;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5px 6px;line-height:1.3;box-shadow:0 2px 8px rgba(0,0,0,0.09);cursor:pointer}
.np.M{background:var(--BL);border-color:var(--B)}.np.F{background:var(--PL);border-color:var(--PK)}.np.O{background:var(--GL);border-color:var(--GR)}
.nn{font-weight:600;word-break:break-word;font-size:11px}
.np.M .nn{color:var(--BD)}.np.F .nn{color:var(--PD)}.np.O .nn{color:#3a3830}
.np.dead .nn{color:var(--RD)!important}.nc{color:var(--MU);font-size:9px;margin-top:1px}
.np.sel{box-shadow:0 0 0 3px var(--AU)!important}
/* Profile panel */
.panel{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,0.15);z-index:100;transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);max-height:78vh;overflow-y:auto;padding:0 0 28px}
.panel.open{transform:translateY(0)}
.ph{display:flex;align-items:center;padding:14px 16px 10px;gap:10px;position:sticky;top:0;background:#fff;border-bottom:1px solid var(--LN);z-index:2}
.pav{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0}
.pav.M{background:var(--BL);color:var(--BD)}.pav.F{background:var(--PL);color:var(--PD)}.pav.O{background:var(--GL);color:#3a3830}
.pnm{font-family:'Playfair Display',serif;font-size:clamp(15px,4vw,19px);font-weight:700;flex:1}
.pcl{color:var(--MU);font-size:12px}
.pclose{background:none;border:none;font-size:22px;cursor:pointer;color:var(--MU);padding:4px}
.pb{padding:12px 16px 0}
.pr{margin-bottom:12px}
.prl{font-size:11px;font-weight:600;color:var(--MU);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
.pills{display:flex;flex-wrap:wrap;gap:6px}
.pill{border-radius:20px;padding:5px 12px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid}
.pill.M{background:var(--BL);border-color:var(--B);color:var(--BD)}.pill.F{background:var(--PL);border-color:var(--PK);color:var(--PD)}.pill.O{background:var(--GL);border-color:var(--GR);color:#3a3830}
.pill.dead{opacity:0.6}
.pdet{font-size:13px;color:var(--INK);display:flex;flex-direction:column;gap:4px}
.pdet span{display:flex;gap:6px}.pdet b{color:var(--MU);font-weight:500;min-width:55px}
/* Actions inside panel */
.pacts{display:flex;gap:8px;padding:10px 16px 4px;border-top:1px solid var(--LN);margin-top:6px}
.pact{flex:1;padding:9px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.pact.edit{background:var(--B);color:#fff}.pact.del{background:#fee;color:var(--RD);border:1.5px solid #fcc}
/* Edit form */
.eform{padding:12px 16px 0;display:none}.eform.open{display:block}
.ef-row{margin-bottom:9px}
.ef-row label{display:block;font-size:11px;font-weight:600;color:var(--MU);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
.ef-row input,.ef-row select{width:100%;padding:8px 10px;border:1.5px solid var(--LN);border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none}
.ef-row input:focus,.ef-row select:focus{border-color:var(--B)}
.ebtns{display:flex;gap:8px;margin-top:10px}
.ebtn{flex:1;padding:9px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.ebtn.save{background:var(--B);color:#fff}.ebtn.cancel{background:var(--GL);color:var(--INK)}
/* Modals */
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal.open{opacity:1;pointer-events:auto}
.mbox{background:#fff;border-radius:20px 20px 0 0;padding:22px 20px 34px;width:100%;max-width:400px}
.mbox h3{font-family:'Playfair Display',serif;font-size:18px;margin-bottom:5px}
.mbox p{font-size:13px;color:var(--MU);margin-bottom:12px}
.mbox input{width:100%;padding:10px 12px;border:1.5px solid var(--LN);border-radius:10px;font-size:16px;font-family:monospace;letter-spacing:4px;outline:none;margin-bottom:8px}
.mbox input:focus{border-color:var(--B)}.merr{color:var(--RD);font-size:12px;min-height:16px;margin-bottom:8px}
.mbtns{display:flex;gap:8px}
.mbtn{flex:1;padding:10px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.mbtn.ok{background:var(--B);color:#fff}.mbtn.cl{background:var(--GL);color:var(--INK)}
.addbox{background:#fff;border-radius:20px 20px 0 0;padding:18px 20px 34px;width:100%;max-width:440px;max-height:82vh;overflow-y:auto}
.addbox h3{font-family:'Playfair Display',serif;font-size:18px;margin-bottom:12px}
</style>
</head>

// Helpers
function isDead(p){return !!(p.died&&p.died!=='');}
function getChildren(pid){let k=[];Object.values(FAMILIES).forEach(f=>{if((f.husb===pid||f.wife===pid)&&f.children)k.push(...f.children);});return[...new Set(k)];}
function getParents(pid){let p=PEOPLE[pid];if(!p)return[];let o=[];(p.famc||[]).forEach(fid=>{let f=FAMILIES[fid];if(!f)return;if(f.husb&&PEOPLE[f.husb])o.push(f.husb);if(f.wife&&PEOPLE[f.wife])o.push(f.wife);});return o;}
function getSpouses(pid){let p=PEOPLE[pid];if(!p)return[];let o=[];(p.fams||[]).forEach(fid=>{let f=FAMILIES[fid];if(!f)return;if(f.husb===pid&&f.wife&&PEOPLE[f.wife])o.push(f.wife);if(f.wife===pid&&f.husb&&PEOPLE[f.husb])o.push(f.husb);});return o;}

function getAncestorChain(pid){
  let chain=[],vis=new Set(),cur=pid;
  while(cur&&!vis.has(cur)&&PEOPLE[cur]){vis.add(cur);chain.push(cur);let pp=getParents(cur);let dad=pp.find(x=>PEOPLE[x]&&PEOPLE[x].sex==='M');cur=dad||pp[0]||null;}
  return chain.reverse();
}

function showBreadcrumb(pid){
  let tr=document.getElementById('tr');
  if(!pid){tr.innerHTML='';return;}
  let chain=getAncestorChain(pid);
  tr.innerHTML=chain.map((id,i)=>{
    let p=PEOPLE[id];
    let nm=p.name.split(' ')[0];
    return (i>0?'<span class="ts">›</span>':'')+'<span class="ti" onclick="openProfile(\''+id+'\')">'+(isDead(p)?'<s>'+nm+'</s>':nm)+'</span>';

}

// Layout
const NW=100,NH=52,HGAP=22,VGAP=84;
let positions={};

function subtreeW(pid,vis){
  vis=vis||new Set();
  if(vis.has(pid))return NW;vis.add(pid);
  let famsH=(PEOPLE[pid]?PEOPLE[pid].fams||[]:[]).filter(fid=>FAMILIES[fid]&&FAMILIES[fid].husb===pid);
  let kids=[];
  famsH.forEach(fid=>kids.push(...(FAMILIES[fid].children||[]).filter(k=>PEOPLE[k])));
  if(!kids.length)return NW;
  let tot=kids.reduce(function(s,k){return s+subtreeW(k,new Set(vis))+HGAP;},0)-HGAP;
  return Math.max(NW*2+14,tot);
}

function assignPos(pid,x,y,vis){
  vis=vis||new Set();
  if(vis.has(pid)||!PEOPLE[pid])return;
  vis.add(pid);
  if(!positions[pid])positions[pid]={x:x,y:y};
  // Spouse right
  getSpouses(pid).forEach(function(spId){
    if(!positions[spId]&&PEOPLE[spId])positions[spId]={x:x+NW+14,y:y};
  });
  // Children
  (PEOPLE[pid].fams||[]).forEach(function(fid){
    let fam=FAMILIES[fid];if(!fam||fam.husb!==pid)return;
    let kids=(fam.children||[]).filter(function(k){return PEOPLE[k]&&!vis.has(k);});
    if(!kids.length)return;
    let totW=kids.reduce(function(s,k){return s+subtreeW(k)+HGAP;},0)-HGAP;
    let spX=fam.wife&&positions[fam.wife]?positions[fam.wife].x:(x+NW+14);
    let midX=(positions[pid].x+NW/2+spX+NW/2)/2;
    let startX=midX-totW/2;
    kids.forEach(function(k){
      let kw=subtreeW(k);
      assignPos(k,startX,y+NH+VGAP,new Set(vis));
      startX+=kw+HGAP;
    });
  });
}

function layoutTree(){
  positions={};
  assignPos('I6',0,0);
  let maxY=Object.values(positions).reduce(function(m,p){return Math.max(m,p.y);},0);
  let ox=0;
  Object.keys(PEOPLE).forEach(function(pid){
    if(!positions[pid]){positions[pid]={x:ox,y:maxY+NH+VGAP};ox+=NW+HGAP;}
  });
}

// Render
let nodeEls={};
function render(filter){
  filter=filter||'';
  layoutTree();
  let mv=document.getElementById('mv'),sv=document.getElementById('sv');
  mv.innerHTML='';sv.innerHTML='';nodeEls={};
  let fl=filter.toLowerCase().trim();
  let visSet=new Set();
  Object.values(PEOPLE).forEach(function(p){
    if(showLivingOnly&&isDead(p))return;
    if(fl&&p.name.toLowerCase().indexOf(fl)<0&&(p.city||'').toLowerCase().indexOf(fl)<0)return;
    visSet.add(p.id);
  });
  let allPos=Object.values(positions);
  let maxX=allPos.reduce(function(m,p){return Math.max(m,p.x);},0)+NW+80;
  let maxY=allPos.reduce(function(m,p){return Math.max(m,p.y);},0)+NH+80;
  sv.setAttribute('width',maxX);sv.setAttribute('height',maxY);
  sv.style.width=maxX+'px';sv.style.height=maxY+'px';
  mv.style.width=maxX+'px';mv.style.height=maxY+'px';

  // SVG lines
  let lines='';
  Object.entries(FAMILIES).forEach(function(entry){
    let fam=entry[1];
    let pids=[fam.husb,fam.wife].filter(function(x){return x&&positions[x]&&visSet.has(x);});
    // Spouse line
    if(pids.length===2){
      let a=positions[pids[0]],b=positions[pids[1]];
      let lx=Math.min(a.x+NW,b.x+NW),rx=Math.max(a.x,b.x);
      // actually connect right edge of left to left edge of right
      let left=a.x<b.x?a:b,right=a.x<b.x?b:a;
      let cy=left.y+NH/2;
      lines+='<line x1="'+(left.x+NW)+'" y1="'+cy+'" x2="'+right.x+'" y2="'+cy+'" stroke="#C8A96A" stroke-width="1.5" opacity="0.55"/>';
    }
    let kids=(fam.children||[]).filter(function(k){return visSet.has(k)&&positions[k];});
    if(!kids.length||!pids.length)return;
    let p1=positions[pids[0]],p2=pids[1]?positions[pids[1]]:p1;
    let pmx=(p1.x+NW/2+p2.x+NW/2)/2;
    let py=p1.y+NH;
    kids.forEach(function(k){
      let kp=positions[k];
      let kx=kp.x+NW/2,ky=kp.y;
      let my=py+(ky-py)*0.42;
      lines+='<path d="M'+pmx+','+py+' L'+pmx+','+my+' L'+kx+','+my+' L'+kx+','+ky+'" fill="none" stroke="#C8A96A" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.72"/>';
    });
  });
  sv.innerHTML=lines;

  // Nodes
  Object.values(PEOPLE).forEach(function(p){
    let pos=positions[p.id];if(!pos)return;
    let ghost=!visSet.has(p.id);
    let dead=isDead(p);
    let sub=p.born?(dead&&p.died&&p.died!=='†'?p.born+'–'+p.died:p.born):'';
    if(p.city&&!sub)sub=p.city;else if(p.city&&sub)sub+=', '+p.city;
    let nd=document.createElement('div');
    nd.className='nd'+(ghost?' ghost':'');
    nd.style.cssText='left:'+pos.x+'px;top:'+pos.y+'px;width:'+NW+'px;'+(ghost?'opacity:0;pointer-events:none':'');
    nd.innerHTML='<div class="np '+p.sex+(dead?' dead':'')+(p.id===selId?' sel':'')+'" style="width:'+NW+'px;min-height:'+NH+'px" data-id="'+p.id+'"><div class="nn">'+p.name+'</div>'+(sub?'<div class="nc">'+sub+'</div>':'')+'</div>';
    nd.querySelector('.np').addEventListener('click',function(){if(!moved)openProfile(p.id);});
    mv.appendChild(nd);nodeEls[p.id]=nd;
  });
}

function doPrint(mode){
  document.getElementById('pmenu').style.display='none';
  var pNW=90,pNH=44,pHG=16,pVG=60;
  var printNodes=[],printPeople={},placed=new Set();
  function pSubW(pid,vis){vis=vis||new Set();if(vis.has(pid))return 1;vis.add(pid);var kids=getChildren(pid).filter(function(k){return PEOPLE[k];});if(!kids.length)return 1;return kids.reduce(function(s,k){return s+pSubW(k,new Set(vis));},0);}
  function pPlace(pid,x,y,vis){vis=vis||new Set();if(vis.has(pid)||!PEOPLE[pid])return;vis.add(pid);placed.add(pid);printPeople[pid]=PEOPLE[pid];var spouses=getSpouses(pid).filter(function(s){return !placed.has(s)&&PEOPLE[s];});var spX=null;if(spouses.length){var spId=spouses[0];placed.add(spId);spX=x+pNW+pHG;printNodes.push({id:spId,x:spX,y:y,isSp:true});printPeople[spId]=PEOPLE[spId];}printNodes.push({id:pid,x:x,y:y,spX:spX});var kids=getChildren(pid).filter(function(k){return PEOPLE[k]&&!vis.has(k);});if(kids.length){var lws=kids.map(function(k){return pSubW(k);});var tot=lws.reduce(function(s,v){return s+v;},0);var totPx=tot*(pNW+pHG)-pHG;var midX=spX!=null?(x+pNW/2+spX+pNW/2)/2:x+pNW/2;var cx=midX-totPx/2;kids.forEach(function(k,i){var kw=lws[i]*(pNW+pHG);pPlace(k,cx+(kw-pNW)/2,y+pNH+pVG,new Set(vis));cx+=kw;});}}
  if(mode==='full'){pPlace('I6',0,0);}
